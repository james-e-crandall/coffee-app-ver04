<div class="parent">
  <div class="container">
    @for (item of homeGridItemList; track $index) {
      @switch (item.type) {
        @case ('image') {
        <div class="img-wrapper">
          <img [ngSrc]="item.image" alt="sunset01" fill />
        </div>
        }
        @case ('button') {
          <div [class]="item.colorClass + ' ' + item.columnClass" class="mat-bg-primary-container center-content">
            <p>{{item.description}}<button matButton="filled">{{item.title}}</button></p>
          </div>
        }
        @default {
          <div [class]="item.colorClass + ' ' + item.columnClass"  class="mat-bg-primary-container center-content">
            <p>{{item.title}}</p>
            <p>{{item.description}}</p>
          </div>
        }
      }

    }

  </div>
</div>
